<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Under Maintenance | Site Temporarily Unavailable</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(135deg, rgba(15, 23, 42, 0.85) 0%, rgba(30, 41, 59, 0.85) 50%, rgba(51, 65, 85, 0.85) 100%), 
                  url('landing.jpg') no-repeat center center fixed;
      background-size: cover;
      color: #fff;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      overflow: hidden;
      position: relative;
    }
    
    /* Animated background elements */
    .bg-elements {
      position: absolute;
      width: 100%;
      height: 100%;
      overflow: hidden;
      z-index: 0;
    }
    
    .bg-element {
      position: absolute;
      border-radius: 50%;
      background: rgba(59, 130, 246, 0.1);
      animation: float 15s infinite linear;
    }
    
    .bg-element:nth-child(1) {
      width: 80px;
      height: 80px;
      top: 10%;
      left: 10%;
      animation-delay: 0s;
    }
    
    .bg-element:nth-child(2) {
      width: 120px;
      height: 120px;
      top: 60%;
      right: 10%;
      animation-delay: -5s;
      background: rgba(139, 92, 246, 0.08);
    }
    
    .bg-element:nth-child(3) {
      width: 60px;
      height: 60px;
      bottom: 20%;
      left: 20%;
      animation-delay: -10s;
      background: rgba(14, 165, 233, 0.1);
    }
    /* Main content container */
    .container {
      max-width: 600px;
      padding: 40px;
      background: rgba(15, 23, 42, 0.7);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3),
                  0 0 0 1px rgba(255, 255, 255, 0.05);
      position: relative;
      z-index: 1;
      animation: fadeIn 0.8s ease-out;
    }
    
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    /* Maintenance icon */
    .maintenance-icon {
      font-size: 80px;
      margin-bottom: 30px;
      color: #3b82f6;
      animation: pulse 2s infinite;
      position: relative;
    }
    
    .maintenance-icon::after {
      content: '';
      position: absolute;
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: rgba(59, 130, 246, 0.2);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: -1;
    }
    
    @keyframes pulse {
      0%, 100% {
        transform: scale(1);
      }
      50% {
        transform: scale(1.05);
      }
    }
    
    /* Headings */
    h1 {
      font-size: 42px;
      margin-bottom: 15px;
      background: linear-gradient(90deg, #60a5fa, #a78bfa);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      font-weight: 700;
      line-height: 1.2;
    }
    
    h2 {
      font-size: 20px;
      margin-bottom: 30px;
      color: #cbd5e1;
      font-weight: 400;
    }
    
    /* Description */
    .description {
      font-size: 18px;
      line-height: 1.6;
      margin-bottom: 40px;
      color: #94a3b8;
    }
    /* Responsive adjustments */
    @media (max-width: 640px) {
      .container {
        margin: 20px;
        padding: 30px 25px;
      }
      
      h1 {
        font-size: 32px;
      }
      
      h2 {
        font-size: 18px;
      }
      
      .description {
        font-size: 16px;
      }
      
      .countdown {
        gap: 10px;
      }
      
      .countdown-item {
        min-width: 70px;
        padding: 12px 8px;
      }
      
      .countdown-value {
        font-size: 28px;
      }
    }
  </style>
</head>
<body>
  <!-- Background elements -->
  <div class="bg-elements">
    <div class="bg-element"></div>
    <div class="bg-element"></div>
    <div class="bg-element"></div>
  </div>
  
  <!-- Main content -->
  <div class="container">
    <div class="maintenance-icon">
      <i class="fas fa-tools"></i>
    </div>
    
    <h1>We're Under Maintenance</h1>
    <h2>Enhancing your experience</h2>
    
    <p class="description">
      Our website is currently undergoing scheduled maintenance to bring you an improved experience. 
      We apologize for any inconvenience and appreciate your patience.
    </p>
    </div>
</body>
</html>
